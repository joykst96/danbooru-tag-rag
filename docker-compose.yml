services:
  danbooru-rag:
    build: .
    container_name: danbooru-rag
    ports:
      - "3333:3333"
    volumes:
      # 빌드 산출물·모델·CSV·설정은 호스트에서 마운트 (이미지에 안 구움)
      - ./data:/app/data:ro            # LanceDB 인덱스 (5070에서 빌드해 복사)
      - ./models:/app/models:ro        # e5-large 모델
      - ./danbooru-tags.csv:/app/danbooru-tags.csv:ro
      - ./.env:/app/.env:ro
    environment:
      - EMBEDDING_DEVICE=cpu
      - DATA_DIR=/app/data
      - MODELS_DIR=/app/models
      # 컨테이너에서 호스트의 llama.cpp(8080 등) 접근.
      # .env 의 LLM_API_URL 이 우선. host.docker.internal 은 호스트 게이트웨이.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
