<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>danbooru-rag 테스트 콘솔</title>
<style>
  :root {
    --bg: #16161a; --panel: #1e1e24; --panel2: #26262e; --bd: #34343e;
    --tx: #e4e4ea; --tx2: #9a9aa6; --acc: #6e8efb; --acc2: #4a6cf7;
    --gen: #3ba776; --char: #b07ae0; --copy: #d08a3a; --warn: #d8643c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--tx);
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    font-size: 14px; line-height: 1.5;
  }
  header {
    padding: 12px 20px; border-bottom: 1px solid var(--bd);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  header h1 { font-size: 15px; font-weight: 600; margin: 0; }
  header .api { font-size: 12px; color: var(--tx2); }
  header input.apiurl {
    background: var(--panel2); border: 1px solid var(--bd); color: var(--tx);
    border-radius: 6px; padding: 4px 8px; font-size: 12px; width: 260px;
  }
  .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--bd); }
  @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } }
  .col { background: var(--bg); padding: 18px 20px; min-height: 80vh; }
  .col h2 { font-size: 13px; font-weight: 600; color: var(--tx2); text-transform: uppercase; letter-spacing: .04em; margin: 0 0 14px; }
  .field { margin-bottom: 12px; }
  label { display: block; font-size: 12px; color: var(--tx2); margin-bottom: 5px; }
  input[type=text], textarea, select {
    width: 100%; background: var(--panel); border: 1px solid var(--bd);
    color: var(--tx); border-radius: 7px; padding: 9px 11px; font-size: 14px;
    font-family: inherit; resize: vertical;
  }
  textarea { min-height: 60px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .row > * { flex: 0 0 auto; }
  .seg { display: inline-flex; border: 1px solid var(--bd); border-radius: 7px; overflow: hidden; }
  .seg button {
    background: var(--panel); color: var(--tx2); border: none; padding: 7px 12px;
    font-size: 13px; cursor: pointer; border-right: 1px solid var(--bd);
  }
  .seg button:last-child { border-right: none; }
  .seg button.on { background: var(--acc2); color: #fff; }
  .slider-wrap { display: flex; align-items: center; gap: 10px; flex: 1 1 auto; min-width: 160px; }
  input[type=range] { flex: 1; accent-color: var(--acc); }
  .kbadge { min-width: 28px; text-align: center; font-variant-numeric: tabular-nums; font-size: 13px; }
  button.go {
    background: var(--acc2); color: #fff; border: none; border-radius: 7px;
    padding: 9px 18px; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  button.go:hover { background: var(--acc); }
  button.go:disabled { opacity: .5; cursor: default; }
  .meta { font-size: 12px; color: var(--tx2); margin: 10px 0 6px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--bd); vertical-align: top; }
  th { color: var(--tx2); font-weight: 500; font-size: 11px; text-transform: uppercase; }
  td.score { font-variant-numeric: tabular-nums; color: var(--acc); width: 56px; }
  td.tag { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12.5px; }
  td.alias { color: var(--tx2); font-size: 12px; }
  .cat { display: inline-block; font-size: 11px; padding: 1px 6px; border-radius: 4px; }
  .cat.c0 { background: rgba(59,167,118,.18); color: var(--gen); }
  .cat.c4 { background: rgba(176,122,224,.18); color: var(--char); }
  .cat.c3 { background: rgba(208,138,58,.18); color: var(--copy); }
  .step { background: var(--panel); border: 1px solid var(--bd); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
  .step .label { font-size: 12px; color: var(--tx2); margin-bottom: 4px; }
  .step .val { font-family: ui-monospace, monospace; font-size: 12.5px; white-space: pre-wrap; word-break: break-word; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip { background: var(--panel2); border: 1px solid var(--bd); border-radius: 5px; padding: 2px 8px; font-size: 12px; font-family: ui-monospace, monospace; }
  .chip.susp { border-color: var(--warn); color: var(--warn); }
  .final { background: var(--panel2); border: 1px solid var(--bd); border-radius: 8px; padding: 12px; margin-top: 10px; font-family: ui-monospace, monospace; font-size: 13px; white-space: pre-wrap; word-break: break-word; }
  .nl { color: var(--tx2); font-size: 13px; line-height: 1.6; margin-top: 8px; font-style: italic; }
  .err { color: var(--warn); font-size: 13px; margin-top: 8px; }
  .empty { color: var(--tx2); font-size: 13px; padding: 16px 0; }
  /* 로그 패널 */
  .logwrap { border-top: 1px solid var(--bd); background: #121215; }
  .logbar { display: flex; align-items: center; gap: 12px; padding: 8px 20px; border-bottom: 1px solid var(--bd); }
  .logbar h2 { font-size: 12px; font-weight: 600; color: var(--tx2); text-transform: uppercase; letter-spacing: .04em; margin: 0; }
  .logbar button { background: var(--panel2); border: 1px solid var(--bd); color: var(--tx2); border-radius: 5px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
  .logbar button.on { background: var(--acc2); color: #fff; border-color: var(--acc2); }
  .logbar .spacer { flex: 1; }
  #logBox { height: 220px; overflow-y: auto; padding: 8px 20px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; line-height: 1.55; }
  .logline { white-space: pre-wrap; word-break: break-word; }
  .logline .lv { display: inline-block; min-width: 52px; }
  .logline.INFO .lv { color: var(--tx2); }
  .logline.WARNING .lv { color: var(--copy); }
  .logline.ERROR .lv { color: var(--warn); }
  .logline .nm { color: var(--char); }
  .logline.WARNING { color: var(--copy); }
  .logline.ERROR { color: var(--warn); }
</style>
</head>
<body>
<header>
  <h1>danbooru-rag 테스트 콘솔</h1>
  <span class="api">API</span>
  <input class="apiurl" id="apiUrl" value="http://127.0.0.1:8000">
</header>

<div class="wrap">
  <!-- ─────────── 좌: 직접 벡터질의 ─────────── -->
  <div class="col">
    <h2>벡터 DB 직접질의</h2>

    <div class="field">
      <label>검색어 (한국어/영어)</label>
      <input type="text" id="dQuery" placeholder="은발, 트윈테일, raiden shogun ..." value="은발">
    </div>

    <div class="field">
      <label>카테고리</label>
      <div class="seg" id="catSeg">
        <button data-cat="" class="on">전체</button>
        <button data-cat="0">일반 (0)</button>
        <button data-cat="3,4">캐릭터+작품 (3,4)</button>
      </div>
    </div>

    <div class="field">
      <label>variant</label>
      <div class="seg" id="varSeg">
        <button data-var="a">A</button>
        <button data-var="b">B</button>
        <button data-var="c" class="on">C</button>
      </div>
    </div>

    <div class="field">
      <label>top-k</label>
      <div class="slider-wrap">
        <input type="range" id="topk" min="1" max="20" value="20">
        <span class="kbadge" id="topkVal">20</span>
      </div>
    </div>

    <div class="row" style="margin-top:4px">
      <button class="go" id="dGo">검색</button>
    </div>

    <div id="dMeta" class="meta"></div>
    <div id="dOut"></div>
  </div>

  <!-- ─────────── 우: 분해 파이프라인 ─────────── -->
  <div class="col">
    <h2>분해 파이프라인 (4회 호출)</h2>

    <div class="field">
      <label>한국어 프롬프트</label>
      <textarea id="pPrompt" placeholder="은발에 트윈테일 로리, 적안, 머리 양쪽으로 드래곤 뿔">은발에 트윈테일 로리, 적안, 머리 양쪽으로 드래곤 뿔</textarea>
    </div>

    <div class="row">
      <div>
        <label style="font-size:11px">일반 variant (한글분해)</label>
        <div class="seg" id="gvSeg">
          <button data-var="a">A</button><button data-var="b">B</button><button data-var="c" class="on">C</button>
        </div>
      </div>
      <div>
        <label style="font-size:11px">영어 variant (번역분해)</label>
        <div class="seg" id="evSeg">
          <button data-var="a">A</button><button data-var="b" class="on">B</button><button data-var="c">C</button>
        </div>
      </div>
      <div>
        <label style="font-size:11px">top-k</label>
        <div class="slider-wrap" style="min-width:120px">
          <input type="range" id="pTopk" min="1" max="20" value="5">
          <span class="kbadge" id="pTopkVal">5</span>
        </div>
      </div>
    </div>

    <div class="row" style="margin-top:12px">
      <button class="go" id="pGo">실행</button>
    </div>

    <div id="pErr" class="err"></div>
    <div id="pSteps" style="margin-top:14px"></div>
    <div id="pFinal"></div>
  </div>
</div>

<div class="logwrap">
  <div class="logbar">
    <h2>서버 로그</h2>
    <button id="logToggle" class="on">자동갱신 ON</button>
    <button id="logClear">지우기</button>
    <span class="spacer"></span>
    <label style="font-size:11px;color:var(--tx2)"><input type="checkbox" id="logInfo" checked> INFO 표시</label>
  </div>
  <div id="logBox"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const apiUrl = () => $('apiUrl').value.replace(/\/$/, '');

// ── 세그먼트 토글 (단일 선택) ──
function segSingle(segId, attr, cb) {
  const seg = $(segId);
  seg.querySelectorAll('button').forEach(b => b.onclick = () => {
    seg.querySelectorAll('button').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    cb && cb(b.dataset[attr]);
  });
}
// ── 세그먼트 토글 (다중) ──
function segMulti(segId) {
  $(segId).querySelectorAll('button').forEach(b => b.onclick = () => b.classList.toggle('on'));
}

let dCat = '', dVar = 'c', gv = 'c', ev = 'b';
segSingle('catSeg', 'cat', v => dCat = v);
segSingle('varSeg', 'var', v => dVar = v);
segSingle('gvSeg', 'var', v => gv = v);
segSingle('evSeg', 'var', v => ev = v);

$('topk').oninput = e => $('topkVal').textContent = e.target.value;
$('pTopk').oninput = e => $('pTopkVal').textContent = e.target.value;

function catLabel(c) {
  return c === 0 ? '<span class="cat c0">일반</span>'
       : c === 4 ? '<span class="cat c4">캐릭터</span>'
       : c === 3 ? '<span class="cat c3">작품</span>'
       : '<span class="cat">'+c+'</span>';
}

// ── 직접질의 ──
$('dGo').onclick = async () => {
  const q = $('dQuery').value.trim();
  if (!q) return;
  $('dGo').disabled = true;
  $('dMeta').textContent = '검색 중...';
  $('dOut').innerHTML = '';
  try {
    const cats = dCat ? dCat.split(',').map(Number) : null;
    const r = await fetch(apiUrl() + '/direct_search', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ query: q, variant: dVar, top_k: +$('topk').value, categories: cats })
    });
    const j = await r.json();
    const rows = j.results || [];
    const charN = rows.filter(x => x.category === 3 || x.category === 4).length;
    $('dMeta').innerHTML = `variant ${dVar.toUpperCase()} · ${rows.length}건 · 캐릭터/작품 ${charN}건`
      + (cats ? ` · 필터 [${cats.join(',')}]` : ' · 무분할');
    if (!rows.length) { $('dOut').innerHTML = '<div class="empty">결과 없음</div>'; return; }
    let html = '<table><thead><tr><th>score</th><th>cat</th><th>tag</th><th>별칭</th></tr></thead><tbody>';
    for (const x of rows) {
      html += `<tr><td class="score">${x.score.toFixed(3)}</td><td>${catLabel(x.category)}</td>`
        + `<td class="tag">${x.tag}</td><td class="alias">${(x.aliases||[]).slice(0,3).join(', ')}</td></tr>`;
    }
    html += '</tbody></table>';
    $('dOut').innerHTML = html;
  } catch (e) {
    $('dMeta').innerHTML = '<span class="err">요청 실패: ' + e.message + ' (API 주소/CORS 확인)</span>';
  } finally { $('dGo').disabled = false; }
};

// ── 분해 파이프라인 ──
$('pGo').onclick = async () => {
  const prompt = $('pPrompt').value.trim();
  if (!prompt) return;
  $('pGo').disabled = true;
  $('pErr').textContent = '';
  $('pSteps').innerHTML = '<div class="empty">실행 중... (LLM 4회 호출, 수~십초)</div>';
  $('pFinal').innerHTML = '';
  try {
    const r = await fetch(apiUrl() + '/decompose_pipeline', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ prompt, general_variant: gv, en_variant: ev, top_k: +$('pTopk').value, generate_nl: true })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    renderDecomposed(d);
  } catch (e) {
    $('pErr').textContent = '요청 실패: ' + e.message + ' (서버/LLM 연결 확인)';
    $('pSteps').innerHTML = '';
  } finally { $('pGo').disabled = false; }
};

function renderDecomposed(d) {
  let h = '';
  // 1. 한국어 분해
  h += chipBlock('① 한국어 분해 단위', d.ko_units || []);
  if (d.person_units && d.person_units.length)
    h += `<div class="meta">└ 인원수 단위: ${d.person_units.join(', ')}</div>`;
  // 2. 번역 분해
  h += chipBlock('② 번역+분해 영어 단위', d.en_units || []);
  $('pSteps').innerHTML = h;

  // 단위별 후보 (한글/영어)
  let c = '';
  if (d.ko_candidates && Object.keys(d.ko_candidates).length) {
    c += '<div class="meta">한국어 단위 → 후보</div>';
    for (const [k, v] of Object.entries(d.ko_candidates))
      c += `<div class="step"><div class="label">${esc(k)}</div><div class="val">${(v||[]).join(', ')}</div></div>`;
  }
  if (d.en_candidates && Object.keys(d.en_candidates).length) {
    c += '<div class="meta">영어 단위 → 후보</div>';
    for (const [k, v] of Object.entries(d.en_candidates))
      c += `<div class="step"><div class="label">${esc(k)}</div><div class="val">${(v||[]).join(', ')}</div></div>`;
  }

  // 최종
  let f = '';
  if (d.candidate_pool) f += `<div class="meta">③ 후보풀 합본 (${d.candidate_pool.length}개)</div><div class="chips" style="margin-bottom:10px">${(d.candidate_pool||[]).map(t=>`<span class="chip">${esc(t)}</span>`).join('')}</div>`;
  if (d.final_tags) f += chipBlock('★ 최종 태그', d.final_tags);
  if (d.final_tags && d.final_tags.length) f += `<div class="final">${esc(d.final_tags.join(', '))}</div>`;
  if (d.hallucinated && d.hallucinated.length) f += `<div class="meta" style="color:var(--warn)">환각 제거됨(후보풀/DB에 없음): ${d.hallucinated.join(', ')}</div>`;
  if (d.nl_prompt) f += `<div class="nl">④ ${esc(d.nl_prompt)}</div>`;
  $('pFinal').innerHTML = c + f;
}

function chipBlock(label, arr, susp) {
  susp = susp || [];
  const chips = arr.map(t => `<span class="chip${susp.includes(t)?' susp':''}">${esc(t)}</span>`).join('');
  return `<div class="meta">${label}</div><div class="chips" style="margin-bottom:10px">${chips}</div>`;
}

function esc(s) { return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

// 엔터로 직접검색
$('dQuery').addEventListener('keydown', e => { if (e.key === 'Enter') $('dGo').click(); });

// ── 로그 폴링 ──
let logSeq = 0, logOn = true, logShowInfo = true;
$('logToggle').onclick = () => {
  logOn = !logOn;
  $('logToggle').classList.toggle('on', logOn);
  $('logToggle').textContent = logOn ? '자동갱신 ON' : '자동갱신 OFF';
};
$('logClear').onclick = () => { $('logBox').innerHTML = ''; };
$('logInfo').onchange = e => { logShowInfo = e.target.checked; };

async function pollLogs() {
  if (logOn) {
    try {
      const r = await fetch(apiUrl() + '/logs?after=' + logSeq);
      const j = await r.json();
      if (j.logs && j.logs.length) {
        const box = $('logBox');
        const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 40;
        for (const l of j.logs) {
          logSeq = Math.max(logSeq, l.seq);
          if (l.level === 'INFO' && !logShowInfo) continue;
          const div = document.createElement('div');
          div.className = 'logline ' + l.level;
          div.innerHTML = `<span class="lv">${l.level}</span> <span class="nm">${esc(l.name)}</span>  ${esc(l.msg)}`;
          box.appendChild(div);
        }
        // 오래된 줄 정리 (500개 제한)
        while (box.childElementCount > 500) box.removeChild(box.firstChild);
        if (atBottom) box.scrollTop = box.scrollHeight;
      }
    } catch (e) { /* 서버 꺼짐/주소변경 시 조용히 무시 */ }
  }
  setTimeout(pollLogs, 1000);
}
pollLogs();
</script>
</body>
</html>
